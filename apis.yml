aid: thundercompute
url: https://raw.githubusercontent.com/api-evangelist/thundercompute/refs/heads/main/apis.yml
name: Thunder Compute
kind: company
description: Thunder Compute is a low-cost GPU cloud offering on-demand virtual GPU
  instances (T4, A6000, A100 80GB, L40, H100 PCIe) billed per minute. Developers
  provision and manage instances primarily through the tnr CLI, with a documented
  REST API at https://api.thundercompute.com:8443/v1 for creating, listing,
  modifying, and deleting instances, managing snapshots and SSH keys, and reading
  pricing/specs. A Terraform provider wraps the same API.
