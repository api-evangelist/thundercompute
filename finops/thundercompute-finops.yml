description: >-
  FinOps view of Thunder Compute spend. Thunder Compute bills on-demand
  virtual GPU instances per minute at a fixed per-GPU-hour rate that varies
  by GPU model and tier (development vs. production). Additional vCPUs are
  billed per vCPU-hour, additional persistent storage per 100GB-hour while
  running, and snapshots per GB-month. There are no data egress fees. The
  dominant cost driver is GPU run time, so the primary optimization levers
  are stopping/deleting idle instances, right-sizing GPU model and count, and
  using snapshots to persist state cheaply between sessions.
notes: >-
  Per-GPU-hour and per-resource rates reconciled against the public pricing
  page on 2026-06-21; verify against GET /v1/pricing and the pricing page,
  which are authoritative and change over time.
