meters:
- name: gpu_hours
  description: GPU run time billed per minute at the per-GPU-hour rate for the GPU model and tier.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - instance
  - gpu_type
  - mode
- name: vcpu_hours
  description: Additional vCPU-hours beyond the 4 included per instance, billed per vCPU/hour.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - instance
- name: storage_gb_hours
  description: Additional persistent storage beyond the included 100GB, billed per 100GB/hour while running.
  unit: gb_hours
  aggregation: sum
  dimensions:
  - account
  - instance
- name: snapshot_gb_months
  description: Long-term snapshot storage billed per GB/month.
  unit: gb_months
  aggregation: sum
  dimensions:
  - account
  - snapshot
principles:
- name: Visibility
  description: Track per-instance GPU run time and storage via GET /v1/instances/list and console billing; attribute spend by GPU type and mode.
- name: Allocation
  description: Tag instances and API tokens per workload/team and map to internal cost centers.
- name: Optimization
  description: Stop or delete idle instances (GPU time is the main driver), right-size GPU model/count, snapshot and tear down between sessions, and prefer development tier when production performance is unnecessary.
- name: Accountability
  description: Assign owners per instance/token; review GPU-hour and storage spend monthly against budget.
